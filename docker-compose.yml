version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: audioclick-db
    environment:
      POSTGRES_USER: audioclick
      POSTGRES_PASSWORD: audioclick123
      POSTGRES_DB: audioclick
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audioclick"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audioclick-backend
    environment:
      DATABASE_URL: postgresql://audioclick:audioclick123@db:5432/audioclick
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 104857600
      DEFAULT_KEYWORD: budget
    volumes:
      - ./uploads:/app/uploads
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audioclick-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: